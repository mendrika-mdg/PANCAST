<!DOCTYPE html>
<html>
<head>

<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>PANCAST</title>

<link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css"/>
<link rel="stylesheet" href="css/style.css"/>

<script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>

<style>
body {
    margin: 0;
}
</style>

</head>

<body>

<!-- NAVBAR -->
<div id="navbar">
    <div class="logo"><a href="/" style="color:white; text-decoration:none;">PANCAST Thunderstorm Probability</a></div>
    <div class="links">
        <a href="/about/">About</a>
        <a href="/partners/">Partners</a>
    </div>
</div>


<div id="timeline">
    <div id="runtime">
        Valid: <span id="validTime">loading...</span>
    </div>

    <div id="timelineControls">
        <button id="playpause">▶</button>
        <input type="range" id="slider" min="0" value="0">
    </div>
</div>

<div id="legend">
    <div id="legendHeader">
        <button id="legendToggle" title="Legend">☰</button>
    </div>

    <div id="legendBody">
        <div class="legendLabel">high</div>
        <div id="colorbar"></div>
        <div class="legendLabel">low</div>
    </div>
</div>

<div id="map"></div>

<script src="js/app.js"></script>

</body>
</html>
