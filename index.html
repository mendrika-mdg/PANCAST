<!DOCTYPE html>
<html>
<head>

<meta charset="utf-8" />
<title>PANCAST</title>

<link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css"/>
<script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>

<style>

#map {
height: 100vh;
}

#timestamp {
position: absolute;
top: 10px;
right: 10px;
z-index: 1000;

background: rgba(0,0,0,0.7);
color: white;

padding: 6px 10px;
font-size: 16px;
font-family: Arial, sans-serif;

border-radius: 4px;
}

</style>

</head>

<body>

<div id="timestamp">Lead time: +30 min</div>
<div id="map"></div>

<script>

var bounds = [
[-39.91001, -23.102037],
[26.57356, 79.549774]
];

var map = L.map('map');
map.fitBounds(bounds);

L.tileLayer(
'https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png',
{
maxZoom: 10
}
).addTo(map);


var frames = [
"images/pancast_t030.png",
"images/pancast_t060.png",
"images/pancast_t090.png",
"images/pancast_t120.png"
];

var labels = [
"Lead time: +30 min",
"Lead time: +60 min",
"Lead time: +90 min",
"Lead time: +120 min"
];


frames.forEach(function(src) {
var img = new Image();
img.src = src;
});


var current = 0;

var overlay = L.imageOverlay(frames[current], bounds, {
opacity: 0.8,
interactive: false
}).addTo(map);


function nextFrame() {

current = (current + 1) % frames.length;

overlay.setUrl(frames[current]);

document.getElementById("timestamp").innerHTML = labels[current];

}


setInterval(nextFrame, 1200);

</script>

</body>
</html>
