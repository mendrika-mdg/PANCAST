<!DOCTYPE html>
<html>
<head>

<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'%3E%3Ctext x='50%25' y='50%25' dominant-baseline='middle' text-anchor='middle' font-size='80'%3E%E2%9A%A1%3C/text%3E%3C/svg%3E">

<title>PANCAST</title>

<link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css"/>
<link rel="stylesheet" href="css/style.css"/>

<script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>

<style>
body {
    margin: 0;
}

/* FLOATING INFO BOX */
#infoBox {
    position: absolute;
    top: 140px;
    left: 50%;
    transform: translateX(-50%);
    background: rgba(0,0,0,0.85);
    color: white;
    padding: 12px 18px;
    border-radius: 8px;
    font-size: 14px;
    z-index: 3000;
    opacity: 0;
    transition: opacity 0.5s ease;
    max-width: 500px;
    text-align: center;
    pointer-events: none;
    box-shadow: 0 6px 20px rgba(0,0,0,0.2);
}
</style>

</head>

<body>

<!-- NAVBAR -->
<div id="navbar">
    <div class="logo">
        <a href="/" style="color:white; text-decoration:none;">
            PANCAST
        </a>
    </div>
    <div class="links">
        <a href="/about/">About</a>
        <a href="/partners/">Partners</a>
        <a href="/news/">Opportunities</a>
    </div>
</div>

<!-- INFO BOX -->
<div id="infoBox">
    ⚡ PANCAST shows real-time thunderstorm probability across Africa using satellite data and AI.
</div>

<!-- TIMELINE -->
<div id="timeline">
    <div id="runtime">
        Valid: <span id="validTime">loading...</span>
    </div>

    <div id="timelineControls">
        <button id="playpause">▶</button>
        <input type="range" id="slider" min="0" value="0">
    </div>
</div>

<!-- LEGEND -->
<div id="legend">
    <div id="legendHeader">
        <button id="legendToggle" title="Legend">☰</button>
    </div>

    <div id="legendBody">
        <div class="legendLabel">high</div>
        <div id="colorbar"></div>
        <div class="legendLabel">low</div>
    </div>
</div>

<!-- MAP -->
<div id="map"></div>

<script src="js/app.js"></script>

<!-- INFO BOX SCRIPT -->
<script>
window.onload = function() {z
    const box = document.getElementById("infoBox");

    // show every time
    setTimeout(() => {
        box.style.opacity = 1;
    }, 200);

    // hide after 5 seconds
    setTimeout(() => {
        box.style.opacity = 0;
    }, 5200);
};
</script>

</body>
</html>
